{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-slate-50 to-slate-100">
    <div class="max-w-md w-full text-center">
        
        <!-- Success Icon -->
        <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-100 text-emerald-600 rounded-2xl mb-6 shadow-lg shadow-emerald-500/20">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
        </div>

        <h2 class="text-3xl font-bold text-slate-900 mb-4">Check your inbox</h2>
        
        <p class="text-slate-700 mb-2 text-lg font-medium">
            If an account exists with that email, we have sent password reset instructions.
        </p>
        <p class="text-slate-500 mb-8 text-sm">
            Please check your inbox (and your spam folder, just in case) for the secure reset link.
        </p>
        
        <!-- Return Button -->
        <a href="{% url 'login' %}" class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg shadow-indigo-500/30 transition-all">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Return to Login
        </a>

    </div>
</div>
{% endblock %}
